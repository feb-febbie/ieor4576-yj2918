<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>D&amp;D Weapon Generator</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: system-ui, sans-serif;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                padding: 3rem 1rem;
            }
            #container {
                width: 100%;
                max-width: 900px;
            }
            h1 {
                font-size: 1.5rem;
                margin-bottom: 0.5rem;
            }
            .subtitle {
                color: #666;
                margin-bottom: 2rem;
                font-size: 0.9rem;
            }
            #input-area {
                display: flex;
                gap: 1rem;
                margin-bottom: 2rem;
            }
            #prompt {
                flex: 1;
                padding: 0.75rem 0;
                border: none;
                border-bottom: 1px solid #e0e0e0;
                font-size: 1rem;
                outline: none;
            }
            #prompt:focus {
                border-bottom-color: #000;
            }
            button {
                padding: 0.75rem 1.5rem;
                background: #000;
                color: #fff;
                border: none;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                cursor: pointer;
            }
            button:disabled {
                opacity: 0.3;
            }
            #result {
                display: none;
            }
            .weapon-card {
                border: 1px solid #e0e0e0;
                padding: 2rem;
                margin-bottom: 1.5rem;
            }
            .weapon-card h2 {
                font-size: 1.3rem;
                margin-bottom: 0.25rem;
            }
            .weapon-card .tags {
                font-size: 0.8rem;
                color: #666;
                margin-bottom: 1rem;
            }
            .weapon-card .flavor {
                font-style: italic;
                color: #444;
                margin-bottom: 1.5rem;
                line-height: 1.5;
            }
            .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 1rem;
                margin-bottom: 1.5rem;
            }
            .stat {
                text-align: center;
                padding: 0.75rem;
                background: #f5f5f5;
            }
            .stat .label {
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #999;
                margin-bottom: 0.25rem;
            }
            .stat .value {
                font-size: 1.1rem;
                font-weight: 600;
            }
            .props {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }
            .prop {
                font-size: 0.8rem;
                padding: 0.25rem 0.75rem;
                border: 1px solid #ccc;
                border-radius: 1rem;
            }
            details {
                margin-top: 1rem;
            }
            summary {
                cursor: pointer;
                font-size: 0.8rem;
                color: #666;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            pre {
                margin-top: 0.75rem;
                padding: 1rem;
                background: #f5f5f5;
                font-size: 0.85rem;
                overflow-x: auto;
                line-height: 1.5;
            }
            #loading {
                display: none;
                color: #999;
                padding: 2rem;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="container">
            <h1>Border Collie Expert</h1>
            <p class="subtitle">
                Ask questions about border collies and get expert answers.
            </p>
            <div id="input-area">
                <input
                    type="text"
                    id="prompt"
                    placeholder="e.g. a frost-enchanted greatsword wielded by a frost giant"
                    autocomplete="off"
                />
                <button id="gen-btn">Generate</button>
            </div>
            <div id="loading">Generating weapon...</div>
            <div id="result"></div>
        </div>
        <script>
            const prompt = document.getElementById("prompt");
            const genBtn = document.getElementById("gen-btn");
            const loading = document.getElementById("loading");
            const result = document.getElementById("result");

            async function generate() {
                const text = prompt.value.trim();
                if (!text) return;

                genBtn.disabled = true;
                loading.style.display = "block";
                result.style.display = "none";

                try {
                    const res = await fetch("/generate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt: text }),
                    });
                    if (!res.ok) {
                        throw new Error("Network response was not ok");
                    }
                    const data = await res.json();
                    console.log(data);
                    console.log(JSON.stringify(data));
                    printText(data.text);
                    
                } catch (e) {
                    result.innerHTML =
                        '<p style="color:red">Error: ' + e.message + "</p>";
                    result.style.display = "block";
                }
                loading.style.display = "none";
                genBtn.disabled = false;
            }

            function printText(text) {

                //Just print the text for now, we can add formatting later. the text is a plain string
                result.innerHTML = 
                    '<div class="weapon-card"><h2>' +
                    text
                    +
                    "</h2></div>";
                   
                result.style.display = "block";
            }

            function stat(label, value) {
                return (
                    '<div class="stat"><div class="label">' +
                    label +
                    '</div><div class="value">' +
                    value +
                    "</div></div>"
                );
            }

            genBtn.addEventListener("click", generate);
            prompt.addEventListener("keydown", function (e) {
                if (e.key === "Enter") generate();
            });
            prompt.focus();
        </script>
    </body>
</html>
